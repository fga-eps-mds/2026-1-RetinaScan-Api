name: SonarCloud CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-sonar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run lint

      - run: npm run test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=fga-eps-mds_2026-1-RetinaScan-Api
            -Dsonar.organization=fga-eps-mds-1
            -Dsonar.sources=src
            -Dsonar.tests=src/tests
            -Dsonar.test.inclusions=**/*.test.ts
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.inclusions=src/modules/**,src/api/routes/**,src/api/middlewares/**,src/infra/database/drizzle/repositories/**,src/shared/validators/**,src/shared/errors/**
