name: Export de métricas

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]
    types: [closed]
  workflow_dispatch:

concurrency:
  group: export-metrics-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true && !contains(github.event.pull_request.labels.*.name, 'NOT RELEASE'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install requests python-dotenv packaging pandas

      - name: Criar diretório
        run: mkdir -p analytics-raw-data

      - name: Coletar métricas e criar release
        env:
          GITHUB_TOKEN: ${{ secrets.API_TOKEN_GITHUB }}
          REPO: ${{ github.event.repository.name }}
          REPO_DOC: ${{ secrets.REPO_DOC }}
          TARGET_COMMITISH: main
          RELEASE_MAJOR: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'MAJOR RELEASE') || false }}
          RELEASE_MINOR: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'MINOR RELEASE') || false }}
          RELEASE_FIX: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'FIX RELEASE') || false }}
        run: python ./sonar_scripts/parser.py

      - name: Ler tag criada
        shell: bash
        run: |
          if [ -f analytics-raw-data/release-tag.txt ]; then
            echo "RELEASE_TAG=$(cat analytics-raw-data/release-tag.txt)" >> "$GITHUB_ENV"
          else
            echo "Arquivo analytics-raw-data/release-tag.txt não encontrado"
            exit 1
          fi

      - name: Envia métricas para repo de Doc
        shell: bash
        run: |
          git config --global user.email "${{ secrets.USER_EMAIL }}"
          git config --global user.name "${{ secrets.USER_NAME }}"

          git clone --single-branch --branch main "https://x-access-token:${{ secrets.API_TOKEN_GITHUB }}@github.com/fga-eps-mds/${{ secrets.REPO_DOC }}.git" doc

          mkdir -p doc/analytics/raw-data
          cp analytics-raw-data/*.json doc/analytics/raw-data/

          cd doc
          git add .
          git commit -m "Adicionando métricas do repositório ${{ github.event.repository.name }} ${RELEASE_TAG}" || echo "Sem alterações"
          git push

      - name: Envia métricas como assets da release
        shell: bash
        run: gh release upload "$RELEASE_TAG" analytics-raw-data/*.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.API_TOKEN_GITHUB }}
