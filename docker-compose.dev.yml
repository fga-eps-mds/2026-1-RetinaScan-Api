services:
  postgres:
    image: postgres:15-alpine
    container_name: retina-scan-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retina-scan
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - retina-scan-network
    env_file:
      - ./env/.env.dev

  minio:
    image: minio/minio
    container_name: retina-scan-minio
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - retina-scan-network
    env_file:
      - ./env/.env.dev

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: retina-scan-api
    ports:
      - 3000:3000
    env_file:
      - env/.env.dev
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - retina-scan-network

volumes:
  postgres_data:
  minio_data:

networks:
  retina-scan-network:
    driver: bridge