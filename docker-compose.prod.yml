services:
  retina-scan-postgres-prod:
    image: postgres:15-alpine
    container_name: retina-scan-postgres-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retina-scan
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    env_file:
      - env/.env.prod
    networks:
      - retina-scan-network
    restart: unless-stopped

  retina-scan-minio-prod:
    image: minio/minio
    container_name: retina-scan-minio
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    env_file:
      - env/.env.prod
    networks:
      - retina-scan-network
    restart: unless-stopped

  retina-scan-api-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: retina-scan-api-prod
    env_file:
      - env/.env.prod
    depends_on:
      retina-scan-postgres-prod:
        condition: service_healthy
      retina-scan-minio-prod:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - retina-scan-network
    restart: unless-stopped

volumes:
  postgres_data_prod:
  minio_data_prod:

networks:
  retina-scan-network:
    driver: bridge
    name: retina-scan-prod-net